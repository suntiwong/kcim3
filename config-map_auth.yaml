apiVersion: v1
kind: ConfigMap
metadata:
  namespace: kcim
  name: nginx
data:
  nginx.conf: |
    user nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log;
    events {
      worker_connections  1024;
    }
    http {
      include       mime.types;
      default_type  application/octet-stream;
      log_format  main
              'remote_addr:$remote_addr\t'
              'time_local:$time_local\t'
              'method:$request_method\t'
              'uri:$request_uri\t'
              'host:$host\t'
              'status:$status\t'
              'bytes_sent:$body_bytes_sent\t'
              'referer:$http_referer\t'
              'useragent:$http_user_agent\t'
              'forwardedfor:$http_x_forwarded_for\t'
              'request_time:$request_time';
      #access_log	/var/log/nginx/access.log main;
      map $request_uri $loggable {
          default                                             1;
          ~*\.(ico|css|js|gif|jpg|jpeg|png|svg|woff|ttf|eot)$ 0;
      }

      server_tokens off;

      gzip on;
      gzip_comp_level 6;
      gzip_vary on;
      gzip_types
      application/atom+xml
      application/javascript
      application/json
      application/ld+json
      application/manifest+json
      application/rss+xml
      application/vnd.geo+json
      application/vnd.ms-fontobject
      application/x-font-ttf
      application/x-web-app-manifest+json
      application/xhtml+xml
      application/xml
      application/octet-stream
      font/opentype
      image/bmp
      image/svg+xml
      image/x-icon
      text/cache-manifest
      text/css
      text/plain
      text/vcard
      text/vnd.rim.location.xloc
      text/vtt
      text/x-component
      text/x-cross-domain-policy;
      gzip_disable "MSIE [1-6]\.(?!.*SV1)";

      proxy_cache_path  /etc/nginx/cache levels=1:2 keys_zone=image-cache:8m max_size=1000m inactive=600m use_temp_path=off;
      log_format upstreamlog '[$time_local] realip_remote_addr=> $realip_remote_addr , http_x_forwarded_for => $http_x_forwarded_for , remote addr=> $remote_addr , remote_user=> $remote_user , server_name=> $server_name , host=> $host , upstream addr=> $proxy_host($upstream_addr), request=> $request, status=> $status, upstream_response_time=> $upstream_response_time , msec=> $msec , request_time=> $request_time';
      access_log /var/log/nginx/access.log upstreamlog if=$loggable;

      map $status $status_text {
        401 'Unauthorized';
        402 'Payment Required';
        403 'Forbidden';
        404 'Not Found';
        405 'Method Not Allowed';
        406 'Not Acceptable';
        407 'Proxy Authentication Required';
        408 'Request Timeout';
        409 'Conflict';
        410 'Gone';
        411 'Length Required';
        412 'Precondition Failed';
        413 'Payload Too Large';
        414 'URI Too Long';
        415 'Unsupported Media Type';
        416 'Range Not Satisfiable';
        417 'Expectation Failed';
        418 'I\'m a teapot';
        421 'Misdirected Request';
        422 'Unprocessable Entity';
        423 'Locked';
        424 'Failed Dependency';
        425 'Too Early';
        426 'Upgrade Required';
        428 'Precondition Required';
        429 'Too Many Requests';
        431 'Request Header Fields Too Large';
        451 'Unavailable For Legal Reasons';
        500 'Internal Server Error';
        501 'Not Implemented';
        502 'Bad Gateway';
        503 'Service Unavailable';
        504 'Gateway Timeout';
        505 'HTTP Version Not Supported';
        506 'Variant Also Negotiates';
        507 'Insufficient Storage';
        508 'Loop Detected';
        510 'Not Extended';
        511 'Network Authentication Required';
        default 'Something is wrong';
      }

      set_real_ip_from 0.0.0.0;
      real_ip_header X-Forwarded-For;

      server {
          listen       80;
          server_name  localhost;
          resolver       kube-dns.kube-system.svc.cluster.local valid=5s;
          set $upstreamapi  kong-api-service.kcim-dev.svc.cluster.local:8000;

          location / {
              root   /usr/share/nginx/html;
              index  index.html index.htm;
          }

          location /healthz {
            access_log off;
            add_header Content-Type text/plain;
            add_header  X-Robots-Tag "noindex, nofollow, nosnippet, noarchive";
            return 200 "Up";
          }

          error_page 401 402 404 405 406 407 408 409 410 411 412 413 414 415 416 417 418 421 422 423 424 425 426 428 429 431 451 500 501 502 503 504 505 506 507 508 510 511 /error-handle.html;

          location /api {
            add_header  X-Robots-Tag "noindex, nofollow, nosnippet, noarchive";
            client_max_body_size 50M;
            proxy_intercept_errors on;
            if ($http_accept ~ "text/html") {
               error_page 501 502 503 504 505 506 507 508 510 511 /error-handle.html;
            }
            proxy_read_timeout 105;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass  http://$upstreamapi;
          }

          location = /error-handle.html {
            ssi on;
            internal;
            auth_basic off;
            root /usr/share/nginx/html/error;
          }

          location /nginx_status {
            stub_status  on;
            access_log   off;
          }
      }
    }

