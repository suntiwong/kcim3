apiVersion: apps/v1
kind: Deployment
metadata:
  name: kcim3-web
  namespace: kcim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kcim3-web
  template:
    metadata:
      labels:
        app: kcim3-web
    spec:
      containers:
      - name: kcim3-web
        image: teegolf/kcim3:3.0.0.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80

        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf

      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
